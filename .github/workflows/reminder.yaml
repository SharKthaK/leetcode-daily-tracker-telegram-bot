name: LeetCode Reminder Bot

on:
  schedule:

    # 10 PM IST
    - cron: '30 16 * * *'

    # 11 PM IST
    - cron: '30 17 * * *'

    # 11:50 PM IST
    - cron: '20 18 * * *'

    # 12:30 AM IST
    - cron: '00 19 * * *'

    # 1 AM IST
    - cron: '30 19 * * *'

    # 2 AM IST
    - cron: '30 20 * * *'

    # 3 AM IST
    - cron: '30 21 * * *'

    # 4 AM IST
    - cron: '30 22 * * *'

  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          LEETCODE_USERNAME: ${{ secrets.LEETCODE_USERNAME }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          MONGO_URI: ${{ secrets.MONGO_URI }}

        run: python main.py
